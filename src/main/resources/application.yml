spring:
  application:
    name: ngs-ai-code-mother
  # 数据库
  datasource:
    url: jdbc:mysql://localhost:3306/ngs_ai_code_mother?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: local
  # Spring Boot HTTP 客户端配置
  http:
    client:
      connect-timeout: 30s
      read-timeout: 180s
      write-timeout: 180s
  # redis
  data:
      redis:
        host: localhost
        port: 6379
        password:
        ttl: 3600
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000

server:
  port: 8123
  servlet:
    context-path: /api
    # 设置响应的字符编码，避免流式返回输出乱码
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ngsliuji.ngsaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn



