spring:
  application:
    name: ngs-ai-code-mother
  datasource:
    url: jdbc:mysql://localhost:3306/ngs_ai_code_mother?   useUnicode=true&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  session:
    timeout: 86400
server:
  port: 8123
  servlet:
    context-path: /api
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ngsliuji.ngsaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


#langchain4j相关模型配置：
langchain4j:
    openai:
      chat-modlel:
        model-name: "qwen3.5-plus"
        api-key: ${DASHSCOPE_API_KEY}
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        timeout: 60000
        log-response: true
        log-request: true


