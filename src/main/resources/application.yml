spring:
  application:
    name: ngs-ai-code-mother
  datasource:
    url: jdbc:mysql://localhost:3306/ngs_ai_code_mother?   useUnicode=true&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  session:
    timeout: 86400
  profiles:
    active: local
  # Spring Boot HTTP 客户端配置
  http:
    client:
      connect-timeout: 30s
      read-timeout: 180s
      write-timeout: 180s
server:
  port: 8123
  servlet:
    context-path: /api
    # 设置响应的字符编码，避免流式返回输出乱码
    encoding:
      charset: UTF-8
      enabled: true
      force: true
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ngsliuji.ngsaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn



